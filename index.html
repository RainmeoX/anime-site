<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RainmeoX · 樱花博客</title>
  <meta name="description" content="RainmeoX 的个人博客 - 大模型微调、推理部署、嵌入式 AI、全栈开发">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
</head>
<body>

<!-- 樱花飘落容器 -->
<div id="sakura-container"></div>

<!-- 顶部导航 -->
<nav class="navbar">
  <div class="nav-container">
    <a href="#/" class="nav-brand">
      <span class="brand-emoji">🌸</span>
      <span class="brand-text">RainmeoX</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="#/" data-route="/">首页</a>
      <a href="#/blog" data-route="/blog">博客</a>
      <a href="#/projects" data-route="/projects">项目</a>
      <a href="#/tags" data-route="/tags">标签</a>
      <a href="#/about" data-route="/about">关于</a>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" id="searchBtn" title="搜索" aria-label="搜索">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="icon-btn" id="themeBtn" title="切换主题" aria-label="切换主题">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="nav-toggle" id="navToggle" title="菜单" aria-label="菜单">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</nav>

<!-- 主体：左右两栏布局 -->
<main class="main-container">
  <div class="columns">

    <!-- 左侧主内容区 -->
    <div class="column column-main" id="mainContent">
      <!-- 内容由 JS 渲染 -->
    </div>

    <!-- 右侧侧边栏 -->
    <aside class="column column-right" id="sidebar">
      <!-- 个人资料卡片 -->
      <div class="widget card profile-widget">
        <div class="profile-avatar">🌸</div>
        <h3 class="profile-name">RainmeoX</h3>
        <p class="profile-bio">大模型微调 · 推理部署 · 嵌入式 AI</p>
        <p class="profile-location">📍 中国 · 深圳</p>
        <div class="profile-stats">
          <a href="#/blog" class="stat-item">
            <span class="stat-num" id="statPosts">0</span>
            <span class="stat-label">文章</span>
          </a>
          <a href="#/projects" class="stat-item">
            <span class="stat-num" id="statProjects">0</span>
            <span class="stat-label">项目</span>
          </a>
          <a href="#/tags" class="stat-item">
            <span class="stat-num" id="statTags">0</span>
            <span class="stat-label">标签</span>
          </a>
        </div>
        <div class="profile-social">
          <a href="https://github.com/RainmeoX" target="_blank" rel="noopener" title="GitHub">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          </a>
          <a href="https://blog.csdn.net/m0_67166125" target="_blank" rel="noopener" title="CSDN">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h-3v10h3c1.65 0 3-1.35 3-3v-4c0-1.65-1.35-3-3-3zm1 7c0 .55-.45 1-1 1h-1v-6h1c.55 0 1 .45 1 1v4z"/></svg>
          </a>
          <a href="https://www.rainmeo.xyz" target="_blank" rel="noopener" title="博客主站">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          </a>
        </div>
      </div>

      <!-- 技能标签云 -->
      <div class="widget card tag-cloud-widget">
        <h3 class="widget-title">🏷 技能标签</h3>
        <div class="tag-cloud" id="tagCloud"></div>
      </div>

      <!-- 最近文章 -->
      <div class="widget card recent-posts-widget">
        <h3 class="widget-title">📝 最近文章</h3>
        <ul class="recent-list" id="recentList"></ul>
      </div>

      <!-- 友情链接 -->
      <div class="widget card links-widget">
        <h3 class="widget-title">🔗 链接</h3>
        <ul class="links-list">
          <li><a href="https://github.com/RainmeoX" target="_blank" rel="noopener"><span>GitHub</span><span class="link-tag">github.com</span></a></li>
          <li><a href="https://blog.csdn.net/m0_67166125" target="_blank" rel="noopener"><span>CSDN 博客</span><span class="link-tag">csdn.net</span></a></li>
          <li><a href="https://www.rainmeo.xyz" target="_blank" rel="noopener"><span>博客主站</span><span class="link-tag">rainmeo.xyz</span></a></li>
        </ul>
      </div>
    </aside>

  </div>
</main>

<!-- 搜索弹窗 -->
<div class="search-modal" id="searchModal">
  <div class="search-modal-content">
    <div class="search-modal-header">
      <input type="text" id="searchInput" placeholder="搜索文章..." autocomplete="off">
      <button class="search-close" id="searchClose">✕</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- 底部 -->
<footer class="footer">
  <div class="footer-container">
    <div class="footer-left">
      <span class="footer-brand">🌸 RainmeoX</span>
      <span class="footer-sub">用代码点亮喜欢的角色</span>
    </div>
    <div class="footer-right">
      <a href="https://github.com/RainmeoX" target="_blank" rel="noopener">GitHub</a>
      <a href="https://blog.csdn.net/m0_67166125" target="_blank" rel="noopener">CSDN</a>
    </div>
  </div>
  <div class="footer-bottom">
    <span>© 2026 RainmeoX · Built with HTML / CSS / JS</span>
  </div>
</footer>

<!-- 回到顶部 -->
<button class="back-to-top" id="backToTop" title="回到顶部" aria-label="回到顶部">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<!-- 第三方库 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="assets/app.js"></script>
</body>
</html>
